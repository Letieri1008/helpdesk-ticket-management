  <path d="M122 244C125 213 150 198 184 202C260 210 342 196 410 205C436 208 449 231 448 260C446 335 452 445 442 506C438 535 413 547 382 544C299 536 220 552 150 541C123 537 111 515 114 487C122 411 112 318 122 244Z" fill="#F8FAFC" stroke="#1E293B" stroke-width="4" stroke-linejoin="round"/>
