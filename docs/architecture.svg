  <path d="M548 221C557 194 580 187 612 193C711 210 837 190 938 200C969 203 985 230 981 262C971 349 988 475 978 554C974 585 949 603 912 598C801 583 690 604 590 595C556 592 540 566 542 532C548 433 528 314 548 221Z" fill="#EFF6FF" stroke="#1D4ED8" stroke-width="4" stroke-linejoin="round"/>
