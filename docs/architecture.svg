<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1280" height="720" rx="28" fill="#F6F7F9"/>
  <rect x="40" y="38" width="1200" height="644" rx="22" fill="#FFFFFF" stroke="#D7DEE9"/>

  <text x="80" y="92" fill="#0F172A" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="800">Helpdesk Ticket Management Architecture</text>
  <text x="80" y="124" fill="#64748B" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16">React + Vite frontend consuming a Django REST Framework API with token authentication and SQLite/PostgreSQL-ready persistence.</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2L10 6L2 10" stroke="#2563EB" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect x="80" y="180" width="250" height="330" rx="14" fill="#0F172A" filter="url(#shadow)"/>
  <text x="110" y="222" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="800">Frontend</text>
  <text x="110" y="252" fill="#CBD5E1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">React + Vite</text>
  <rect x="110" y="286" width="190" height="46" rx="8" fill="#1E293B"/>
  <text x="130" y="315" fill="#E2E8F0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Admin Shell</text>
  <rect x="110" y="348" width="190" height="46" rx="8" fill="#1E293B"/>
  <text x="130" y="377" fill="#E2E8F0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Dashboard</text>
  <rect x="110" y="410" width="190" height="46" rx="8" fill="#1E293B"/>
  <text x="130" y="439" fill="#E2E8F0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Ticket UI</text>

  <rect x="500" y="170" width="280" height="360" rx="14" fill="#EFF6FF" stroke="#BFDBFE" filter="url(#shadow)"/>
  <text x="532" y="212" fill="#1E3A8A" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="800">Django REST API</text>
  <text x="532" y="242" fill="#475569" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">DRF viewsets + serializers</text>
  <rect x="532" y="276" width="216" height="46" rx="8" fill="#FFFFFF" stroke="#D7DEE9"/>
  <text x="552" y="305" fill="#0F172A" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Token Auth</text>
  <rect x="532" y="338" width="216" height="46" rx="8" fill="#FFFFFF" stroke="#D7DEE9"/>
  <text x="552" y="367" fill="#0F172A" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Tickets App</text>
  <rect x="532" y="400" width="216" height="46" rx="8" fill="#FFFFFF" stroke="#D7DEE9"/>
  <text x="552" y="429" fill="#0F172A" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Users App</text>
  <rect x="532" y="462" width="216" height="46" rx="8" fill="#FFFFFF" stroke="#D7DEE9"/>
  <text x="552" y="491" fill="#0F172A" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Business Rules</text>

  <rect x="950" y="205" width="220" height="260" rx="14" fill="#ECFDF3" stroke="#BBF7D0" filter="url(#shadow)"/>
  <text x="982" y="247" fill="#14532D" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="800">Database</text>
  <text x="982" y="277" fill="#475569" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">SQLite now</text>
  <text x="982" y="301" fill="#475569" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">PostgreSQL-ready</text>
  <rect x="982" y="338" width="156" height="44" rx="8" fill="#FFFFFF" stroke="#BBF7D0"/>
  <text x="1002" y="365" fill="#0F172A" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Tickets</text>
  <rect x="982" y="394" width="156" height="44" rx="8" fill="#FFFFFF" stroke="#BBF7D0"/>
  <text x="1002" y="421" fill="#0F172A" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Comments</text>

  <path d="M330 345H492" stroke="#2563EB" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="365" y="324" fill="#2563EB" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="800">REST + Token</text>

  <path d="M780 345H940" stroke="#2563EB" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="820" y="324" fill="#2563EB" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="800">ORM</text>

  <rect x="220" y="575" width="840" height="56" rx="12" fill="#F8FAFC" stroke="#E2E8F0"/>
  <text x="255" y="610" fill="#334155" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">CI Pipeline:</text>
  <text x="350" y="610" fill="#64748B" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">Django checks/tests + React lint/build via GitHub Actions</text>
