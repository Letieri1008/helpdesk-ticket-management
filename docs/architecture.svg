  <path d="M187 646C348 631 520 642 690 638C861 634 1041 628 1215 642C1238 644 1248 670 1234 692C1220 714 1178 704 1136 704C812 705 488 706 164 700C135 699 127 660 151 650C160 646 172 647 187 646Z" fill="#FFF7ED" stroke="#C2410C" stroke-width="3" stroke-linejoin="round"/>
