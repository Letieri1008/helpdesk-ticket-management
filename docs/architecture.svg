  <text x="116" y="113" fill="#111827" font-family="Comic Sans MS, Segoe Print, Bradley Hand, cursive" font-size="32" font-weight="700">
    Helpdesk Architecture
  </text>
  <text x="118" y="155" fill="#475569" font-family="Comic Sans MS, Segoe Print, Bradley Hand, cursive" font-size="18">
    frontend + API + persistence + CI, mapped like a tablet sketch
  </text>

